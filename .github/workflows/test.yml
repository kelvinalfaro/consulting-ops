name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run audit:parity
      - run: npm run audit:release
      - run: npm pack --dry-run
      - run: node onboard.mjs --answers examples/onboarding-answers.example.json --target .ci-workspace
      - run: node doctor.mjs --target .ci-workspace
      - if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: docker build -t consulting-ops-ci .

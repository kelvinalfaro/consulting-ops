version: 1

search_terms:
  - '"request for proposals" "strategic planning"'
  - '"request for qualifications" "executive coaching"'
  - '"call for consultants" facilitation'

sources:
  # Add public RSS feeds, APIs, search result pages, or procurement portals.
  # Provider implementations must respect site terms and robots guidance.
  - id: public-web-search
    type: web_search
    enabled: true
    label: "Public web search"
    max_queries: 10
  - id: example-manual
    type: manual
    enabled: true
    label: "Manual opportunity inbox"
  - id: example-official-procurement-page
    type: html_links
    enabled: false
    label: "Example official procurement office"
    url: "https://example.gov/procurement/opportunities"
    link_include_terms: ["RFP", "RFQ", "consultant", "strategic planning", "facilitation", "coaching"]
    link_exclude_terms: ["construction", "engineering"]

filters:
  include_terms: ["consulting", "coaching", "facilitation"]
  exclude_terms: []
  # Optional freshness gate. Undated opportunities remain eligible for review.
  max_posting_age_days: 120
  # Issuers can also be listed one per bullet in private data/blacklist.md.
  blacklist_issuers: []
  countries: ["United States"]
